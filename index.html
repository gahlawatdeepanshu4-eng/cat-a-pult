<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1b2a41">
<title>Cat-a-pult</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1b2a41;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* Keep the game clear of the notch / Dynamic Island / home indicator by
     padding the play area in by each edge's safe-area inset (0 on phones that
     have none). The canvas fills what's left, so every edge control moves in. */
  body {
    box-sizing: border-box;
    padding:
      env(safe-area-inset-top) env(safe-area-inset-right)
      env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  canvas { display: block; width: 100%; height: 100%; }
  #rotate {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: #1b2a41;
    color: #f2e8cf;
    font: 600 20px/1.5 system-ui, sans-serif;
    text-align: center;
    padding: 24px;
  }
  @media (orientation: portrait) {
    #rotate { display: flex; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="rotate">Turn your phone sideways to play</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
